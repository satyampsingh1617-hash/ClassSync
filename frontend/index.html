<!DOCTYPE html>
<html>
<head>
  <title>Attendance System</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
    }

    button {
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    table {
      border-collapse: collapse;
      margin-top: 20px;
      width: 100%;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

  <button onclick="logout()">Logout</button>

  <h2 id="addTitle">Add Student</h2>
  <input type="text" id="name" placeholder="Name">
  <input type="number" id="roll" placeholder="Roll">
  <button id="addBtn" onclick="addStudent()">Add Student</button>

  <h2 id="attTitle">Mark Attendance</h2>

  <select id="studentSelect"></select>

  <select id="status">
    <option value="Present">Present</option>
    <option value="Absent">Absent</option>
  </select>

  <button id="markBtn" onclick="markAttendance()">Mark</button>

  <h2>Students</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll</th>
      </tr>
    </thead>
    <tbody id="studentList"></tbody>
  </table>

  <h2>Attendance</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="attendanceList"></tbody>
  </table>

  <script>
    const role = localStorage.getItem("role");

// 🔥 agar login nahi kiya to wapas bhej
if (!role) {
  window.location.href = "login.html";
}

// 🔥 ROLE CONTROL
if (role !== "admin") {
  document.getElementById("addTitle").style.display = "none";
  document.getElementById("name").style.display = "none";
  document.getElementById("roll").style.display = "none";
  document.getElementById("addBtn").style.display = "none";
}

if (role === "student") {
  document.getElementById("attTitle").style.display = "none";
  document.getElementById("studentSelect").style.display = "none";
  document.getElementById("status").style.display = "none";
  document.getElementById("markBtn").style.display = "none";
}

    // 🔥 ADD STUDENT
    async function addStudent() {
      const name = document.getElementById("name").value;
      const roll = document.getElementById("roll").value;

      const res = await fetch("http://localhost:5000/add-student", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, roll })
      });

      const msg = await res.text();
      alert(msg);

      document.getElementById("name").value = "";
      document.getElementById("roll").value = "";

      loadStudents();
      loadStudentDropdown();
    }

    // 🔥 MARK ATTENDANCE
    async function markAttendance() {
      const roll = document.getElementById("studentSelect").value;
      const status = document.getElementById("status").value;

      const res = await fetch("http://localhost:5000/mark-attendance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ roll, status })
      });

      const msg = await res.text();
      alert(msg);

      loadAttendance();
    }

    // 🔥 LOAD STUDENTS
    async function loadStudents() {
      const res = await fetch("http://localhost:5000/students");
      const data = await res.json();

      const list = document.getElementById("studentList");
      list.innerHTML = "";

      data.forEach(s => {
        list.innerHTML += `<tr>
          <td>${s.name}</td>
          <td>${s.roll}</td>
        </tr>`;
      });
    }

    // 🔥 DROPDOWN
    async function loadStudentDropdown() {
      const res = await fetch("http://localhost:5000/students");
      const data = await res.json();

      const dropdown = document.getElementById("studentSelect");
      dropdown.innerHTML = "";

      data.forEach(s => {
        dropdown.innerHTML += `<option value="${s.roll}">
          ${s.roll} - ${s.name}
        </option>`;
      });
    }

    // 🔥 LOAD ATTENDANCE
    async function loadAttendance() {
      const res = await fetch("http://localhost:5000/attendance");
      const data = await res.json();

      const list = document.getElementById("attendanceList");
      list.innerHTML = "";

      data.forEach(a => {
        list.innerHTML += `<tr>
          <td>${a.name}</td>
          <td>${a.roll}</td>
          <td>${a.status}</td>
          <td>${a.date}</td>
        </tr>`;
      });
    }

    // 🔥 LOGOUT
    function logout() {
      localStorage.removeItem("role");
      window.location.href = "login.html";
    }

    // AUTO LOAD
    loadStudents();
    loadAttendance();
    loadStudentDropdown();
  </script>

</body>
</html>
